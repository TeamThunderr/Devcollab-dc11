# docker-compose.dev.yml
# ─────────────────────────────────────────────────────────────────────────────
# Local development infrastructure ONLY — postgres + redis.
# web and api run outside Docker via: npm run dev
# ─────────────────────────────────────────────────────────────────────────────


services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devcollab-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: devcollab
      POSTGRES_PASSWORD: devcollab
      POSTGRES_DB: devcollab
    ports:
      - '5434:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devcollab -d devcollab']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: devcollab-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
